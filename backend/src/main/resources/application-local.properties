# Local dev profile — run with: mvn spring-boot:run -Dspring-boot.run.profiles=local
# Switch to H2 in-memory — no Postgres install needed
spring.datasource.url=jdbc:h2:mem:soccerdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# OAuth2 - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:4200/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope=profile,email

# JWT Token
app.jwt.secret=${APP_JWT_SECRET:local-development-jwt-secret-change-before-production-123456789}
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000
app.frontend.origin=${APP_FRONTEND_ORIGIN:http://localhost:4200}
