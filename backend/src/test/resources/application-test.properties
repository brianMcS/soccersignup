spring.datasource.url=jdbc:h2:mem:soccerdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=profile,email

app.jwt.secret=test-jwt-secret-that-is-long-enough-for-hs256-signing
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000
app.frontend.origin=http://localhost:4200
