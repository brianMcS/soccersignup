<div class="bell-wrap">

  <!-- Bell button -->
  <button
    class="bell-btn"
    (click)="toggleDropdown()"
    [class.bell-btn--active]="dropdownOpen"
    aria-label="Notifications"
  >
    <!-- Bell SVG icon -->
    <svg class="bell-icon" viewBox="0 0 24 24" fill="none"
         xmlns="http://www.w3.org/2000/svg">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"
            stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"
            stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <!-- Unread badge — only shown when count > 0 -->
    <span *ngIf="unreadCount > 0" class="bell-badge">
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </span>
  </button>

  <!-- Dropdown -->
  <div *ngIf="dropdownOpen" class="bell-dropdown">

    <!-- Dropdown header -->
    <div class="bell-dropdown-header">
      <span class="bell-dropdown-title">Notifications</span>
      <button
        *ngIf="unreadCount > 0"
        class="mark-all-btn"
        (click)="markAllRead()"
      >
        Mark all read
      </button>
    </div>

    <!-- Loading state -->
    <div *ngIf="loading" class="bell-loading">
      <div class="skeleton skeleton-notif"></div>
      <div class="skeleton skeleton-notif"></div>
    </div>

    <!-- Empty state -->
    <div *ngIf="!loading && notifications.length === 0" class="bell-empty">
      <span class="bell-empty-icon">🔔</span>
      <p>No notifications yet</p>
    </div>

    <!-- Notification list -->
    <ul *ngIf="!loading && notifications.length > 0" class="notif-list">
      <li
        *ngFor="let n of notifications"
        class="notif-item"
        [class.notif-item--unread]="!n.read"
        (click)="onNotificationClick(n)"
      >
        <span class="notif-dot" *ngIf="!n.read"></span>
        <div class="notif-body">
          <p class="notif-message">{{ n.message }}</p>
          <span class="notif-time">{{ formatTime(n.createdAt) }}</span>
        </div>
      </li>
    </ul>

  </div>
</div>
